server {
    listen 443 ssl;
    http2 on;
    server_name kilc.co.uk www.kilc.co.uk;

    ssl_certificate     /etc/nginx/certs/kilc-origin.pem;
    ssl_certificate_key /etc/nginx/certs/kilc-origin-key.pem;

    root /usr/share/nginx/html/kilc-website;
    index index.html;

    # www → root redirect
    if ($host = www.kilc.co.uk) {
        return 301 https://kilc.co.uk$request_uri;
    }

    # Static assets with long cache
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|woff2|ico)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Clean URLs (Astro static output)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

# HTTP → HTTPS redirect (Cloudflare handles this, but just in case)
server {
    listen 80;
    server_name kilc.co.uk www.kilc.co.uk;
    return 301 https://kilc.co.uk$request_uri;
}
