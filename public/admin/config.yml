backend:
  name: github
  repo: kilc-uk/kilc-website
  branch: main
  base_url: https://sveltia-cms-auth.shy-star-b244.workers.dev

# Media files stored in the repo
media_folder: public/images
public_folder: /images

# Site URL for previews
site_url: https://kilc.co.uk
display_url: https://kilc.co.uk

collections:
  # ----- Service Pages (EN) -----
  - name: services-en
    label: "Services (English)"
    folder: src/content/services/en
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Icon, name: icon, widget: string, required: false }
      - { label: Display Order, name: order, widget: number, required: false }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  # ----- Service Pages (ZH) -----
  - name: services-zh
    label: "Services (Chinese)"
    folder: src/content/services/zh
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Icon, name: icon, widget: string, required: false }
      - { label: Display Order, name: order, widget: number, required: false }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  # ----- Team Members (EN) -----
  - name: team-en
    label: "Team (English)"
    folder: src/content/team/en
    create: true
    extension: md
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Bio, name: bio, widget: text, required: false }
      - { label: Organisation (leave blank for core team members), name: org, widget: string, required: false }
      - { label: Display Order, name: order, widget: number, required: false }
      - { label: Body, name: body, widget: markdown }

  # ----- Team Members (ZH) -----
  - name: team-zh
    label: "Team (Chinese)"
    folder: src/content/team/zh
    create: true
    extension: md
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Bio, name: bio, widget: text, required: false }
      - { label: Organisation (leave blank for core team members), name: org, widget: string, required: false }
      - { label: Display Order, name: order, widget: number, required: false }
      - { label: Body, name: body, widget: markdown }

  # ----- Policy Pages (EN) -----
  - name: policies-en
    label: "Policies (English)"
    folder: src/content/policies/en
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Last Updated, name: lastUpdated, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  # ----- Policy Pages (ZH) -----
  - name: policies-zh
    label: "Policies (Chinese)"
    folder: src/content/policies/zh
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Last Updated, name: lastUpdated, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  # ----- Guardian Shield Coverage (EN) -----
  - name: coverage-en
    label: "Guardian Shield Coverage (English)"
    folder: src/content/coverage/en
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Display Order, name: order, widget: number, required: false }

  # ----- Guardian Shield Coverage (ZH) -----
  - name: coverage-zh
    label: "Guardian Shield Coverage (Chinese)"
    folder: src/content/coverage/zh
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Display Order, name: order, widget: number, required: false }

  # ----- Company Formation Steps (EN) -----
  - name: formation-steps-en
    label: "Company Formation Steps (English)"
    folder: src/content/formation-steps/en
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Icon, name: icon, widget: string, required: false }
      - { label: Display Order, name: order, widget: number, required: false }

  # ----- Company Formation Steps (ZH) -----
  - name: formation-steps-zh
    label: "Company Formation Steps (Chinese)"
    folder: src/content/formation-steps/zh
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Icon, name: icon, widget: string, required: false }
      - { label: Display Order, name: order, widget: number, required: false }

  # ----- Blog Posts (ZH) -----
  - name: blog-zh
    label: "Blog Posts (Chinese)"
    folder: src/content/blog/zh
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Author, name: author, widget: string }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  # ----- Blog Posts (EN) -----
  - name: blog-en
    label: "Blog Posts (English)"
    folder: src/content/blog/en
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Author, name: author, widget: string }
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
